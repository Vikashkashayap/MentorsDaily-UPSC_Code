# MentorsDaily React SPA — nginx (AWS EC2 t3.micro)
# Copy to /etc/nginx/sites-available/mentorsdaily and symlink sites-enabled.

upstream mentorsdaily_api {
    server 127.0.0.1:5000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name mentorsdaily.com www.mentorsdaily.com;

  # Redirect HTTP -> HTTPS (uncomment when TLS is configured)
  # return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mentorsdaily.com www.mentorsdaily.com;

    root /var/www/frontend-upsc/dist;
    index index.html;

    # ssl_certificate     /etc/letsencrypt/live/mentorsdaily.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mentorsdaily.com/privkey.pem;

    # Gzip — reduces bandwidth for text assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed Vite assets — long cache (immutable filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Static images / logos — cache with revalidation
    location ~* ^/(images|Logo)/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # API reverse proxy (Node backend on same EC2)
    location /api/ {
        proxy_pass http://mentorsdaily_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_read_timeout 120s;
    }

    # SPA fallback — React Router client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html — never long-cache (deploy updates)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
